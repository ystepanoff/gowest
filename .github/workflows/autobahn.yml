name: Autobahn

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  conformance:
    name: autobahn conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GitHub-hosted Ubuntu runners ship Docker and the compose plugin, so the
      # same setup used locally (autobahn/docker-compose.yml) runs unchanged.
      - name: Run Autobahn fuzzing client
        working-directory: autobahn
        # --abort-on-container-exit stops once the client finishes; the gowest
        # server never exits on its own. wstest exits 0 regardless of results,
        # so the run is gated by check_report.py below, not by this step.
        run: docker compose up --build --abort-on-container-exit
      - name: Check conformance report
        working-directory: autobahn
        run: python3 check_report.py
      - name: Upload Autobahn report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report
          path: autobahn/report/
          if-no-files-found: warn
